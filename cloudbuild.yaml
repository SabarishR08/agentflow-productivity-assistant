steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/agentflow", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/agentflow"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - agentflow
      - --image
      - gcr.io/$PROJECT_ID/agentflow
      - --platform
      - managed
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --port
      - "8080"
      - --set-secrets=TODOIST_API_TOKEN=TODOIST_API_TOKEN:latest
      - --set-secrets=GOOGLE_CALENDAR_KEY=GOOGLE_CALENDAR_KEY:latest
      - --set-env-vars=GOOGLE_CALENDAR_ID=sabarish.edu2024@gmail.com
images:
  - gcr.io/$PROJECT_ID/agentflow
substitutions:
  _REGION: us-central1
